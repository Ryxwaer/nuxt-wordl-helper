services:
  vue-app:
    build:
      context: .
      args:
        - NODE_ENV=production
    image: vue-wordl:latest
    pull_policy: build
    # Set DB_URI and THEME_API in Portainer (plain names). Compose maps them to
    # the NUXT_-prefixed names Nuxt reads to override runtimeConfig at runtime.
    environment:
      - NUXT_DB_URI=${DB_URI}
      - NUXT_THEME_API=${THEME_API}
    networks:
      - nginx-proxy-manager_default
    restart: unless-stopped

networks:
  nginx-proxy-manager_default:
    external: true